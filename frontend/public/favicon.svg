<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fundo escuro -->
  <rect width="32" height="32" rx="4" fill="#0a0a0f"/>

  <!-- Mastro -->
  <rect x="6" y="3" width="1.8" height="22" rx="0.9" fill="#00aaff"/>

  <!-- Bandeira preta com borda neon -->
  <rect x="7.8" y="3" width="16" height="13" rx="1" fill="#0d1117" stroke="#00aaff" stroke-width="0.7"/>

  <!-- Crânio: cabeça -->
  <ellipse cx="15.8" cy="8.2" rx="4.2" ry="3.8" fill="#00aaff"/>

  <!-- Olhos vazados -->
  <ellipse cx="14" cy="7.8" rx="1.2" ry="1.3" fill="#0d1117"/>
  <ellipse cx="17.6" cy="7.8" rx="1.2" ry="1.3" fill="#0d1117"/>

  <!-- Nariz -->
  <ellipse cx="15.8" cy="9.8" rx="0.55" ry="0.5" fill="#0d1117"/>

  <!-- Mandíbula -->
  <rect x="12.8" y="11" width="6" height="2.2" rx="0.5" fill="#00aaff"/>

  <!-- Dentes vazados -->
  <rect x="13"   y="11.6" width="1.2" height="1.7" rx="0.3" fill="#0d1117"/>
  <rect x="15"   y="11.6" width="1.2" height="1.7" rx="0.3" fill="#0d1117"/>
  <rect x="17.2" y="11.6" width="1.2" height="1.7" rx="0.3" fill="#0d1117"/>

  <!-- Ossos cruzados embaixo da bandeira -->
  <line x1="8"  y1="28" x2="24" y2="19" stroke="#00aaff" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="28" x2="8"  y2="19" stroke="#00aaff" stroke-width="2" stroke-linecap="round"/>

  <!-- Pontas dos ossos -->
  <circle cx="8"  cy="28" r="1.5" fill="#00aaff"/>
  <circle cx="24" cy="28" r="1.5" fill="#00aaff"/>
  <circle cx="8"  cy="19" r="1.5" fill="#00aaff"/>
  <circle cx="24" cy="19" r="1.5" fill="#00aaff"/>
</svg>
